name: CI
permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Clippy lints ordered by platform (glibc, musl, windows)
  clippy_linux_glibc_x64:
    uses: ./.github/workflows/clippy.yml
    with:
      os: ubuntu-latest
      platform-name: Linux-glibc-x64

  clippy_linux_musl_x64:
    uses: ./.github/workflows/clippy.yml
    with:
      os: ubuntu-latest
      container: rust:alpine
      setup-command: apk add --no-cache musl-dev
      platform-name: Linux-musl-x64

  clippy_windows_x64:
    uses: ./.github/workflows/clippy.yml
    with:
      os: windows-latest
      platform-name: Windows-x64

  # Linux builds ordered by platform (glibc, musl) then flavor (debug, release)
  build_linux_glibc_x64_debug:
    uses: ./.github/workflows/build-and-test.yml
    with:
      os: ubuntu-latest
      build-flavor: debug
      platform-name: Linux-glibc-x64

  build_linux_glibc_x64_release:
    uses: ./.github/workflows/build-and-test.yml
    with:
      os: ubuntu-latest
      build-flavor: release
      platform-name: Linux-glibc-x64

  build_linux_musl_x64_debug:
    uses: ./.github/workflows/build-and-test.yml
    with:
      os: ubuntu-latest
      container: rust:alpine
      setup-command: apk add --no-cache musl-dev
      build-flavor: debug
      platform-name: Linux-musl-x64

  build_linux_musl_x64_release:
    uses: ./.github/workflows/build-and-test.yml
    with:
      os: ubuntu-latest
      container: rust:alpine
      setup-command: apk add --no-cache musl-dev
      build-flavor: release
      platform-name: Linux-musl-x64

  # Windows builds ordered by flavor (debug, release)
  build_windows_x64_debug:
    uses: ./.github/workflows/build-and-test.yml
    with:
      os: windows-latest
      build-flavor: debug
      platform-name: Windows-x64

  build_windows_x64_release:
    uses: ./.github/workflows/build-and-test.yml
    with:
      os: windows-latest
      build-flavor: release
      platform-name: Windows-x64

  # TDH integration tests.  Runs the `tests/etw_tdh_integration.rs`
  # binary which emits real ETW TraceLogging events and decodes them
  # through `TdhDecoder`.  Tests are `#[ignore]`'d because they require
  # elevation to start an ETW session; `windows-latest` runners execute
  # as `runneradmin`, which satisfies that.  Targeting the binary by
  # name avoids sweeping up unrelated `#[ignore]`'d unit tests in
  # `src/**`.  `--test-threads=1` serialises the tests because each one
  # owns a process-global ETW consumer session.
  integration_tdh_windows_x64:
    name: TDH Integration Tests (Windows-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run etw_tdh_integration
        working-directory: one_collect
        run: cargo test --locked --test etw_tdh_integration -- --ignored --nocapture --test-threads=1

  # Benchmarks ordered by OS (linux, windows) then platform (glibc, musl)
  bench_linux_glibc_x64:
    uses: ./.github/workflows/benchmarks.yml
    with:
      os: ubuntu-latest
      platform-name: Linux-glibc-x64

  bench_linux_musl_x64:
    uses: ./.github/workflows/benchmarks.yml
    with:
      os: ubuntu-latest
      container: rust:alpine
      setup-command: apk add --no-cache musl-dev
      platform-name: Linux-musl-x64

  bench_windows_x64:
    uses: ./.github/workflows/benchmarks.yml
    with:
      os: windows-latest
      platform-name: Windows-x64

  # Docker tests
  docker_console:
    uses: ./.github/workflows/docker-tests.yml
